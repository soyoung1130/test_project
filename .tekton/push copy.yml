apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/task: "[git-clone, buildah, git-cli]"
  name: build-and-push
spec:
  params:
  - name: repo_url
    value: '{{ repo_url }}'
  - name: revision
    value: '{{ revision }}'
  - name: image_url
    value: "registry.ocp.test.com:5000/demo/test_project:{{ revision }}"
  - name: gitops_repo_url
    value: "https://github.com/seejune2/gitops"
  pipelineSpec:
    params:
    - name: repo_url
    - name: revision
    - name: image_url
    - name: gitops_repo_url
    tasks:
    - name: fetch-repository
      params:
      - name: url
        value: $(params.repo_url)
      - name: revision
        value: $(params.revision)
      taskRef:
        name: git-clone
      workspaces:
      - name: output
        workspace: source
      - name: basic-auth
        workspace: basic-auth

    - name: build-image
      runAfter:
      - fetch-repository
      taskRef:
        name: buildah
      params:
      - name: IMAGE
        value: $(params.image_url)
      - name: TLSVERIFY
        value: "false"
      workspaces:
      - name: source
        workspace: source
      - name: dockerconfig
        workspace: docker-config

    - name: update-gitops
      runAfter:
      - build-image
      taskRef:
        name: git-cli
      params:
      - name: GIT_USER_NAME
        value: "tekton-ci"
      - name: GIT_USER_EMAIL
        value: "tekton@ocp.test.com"
      - name: GIT_SCRIPT
        value: |
          # 1. GitOps 레포 클론
          git clone $(params.gitops_repo_url) gitops-repo
          cd gitops-repo/overlays/dev

          # 2. kustomization.yaml의 이미지 태그 수정
          sed -i "s/newTag: .*/newTag: $(params.revision)/g" kustomization.yaml

          # 3. 변경사항 커밋 및 푸시
          git config --global user.email "tekton@ocp.test.com"
          git config --global user.name "tekton-ci"
          git add kustomization.yaml
          git commit -m "chore: update image tag to $(params.revision) [skip ci]"
          git push origin main
      workspaces:
      - name: source
        workspace: source
      - name: basic-auth
        workspace: basic-auth

    workspaces:
    - name: source
    - name: basic-auth
    - name: docker-config
  workspaces:
  - name: source
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
  - name: basic-auth
    secret:
      secretName: '{{ git_auth_secret }}'
  - name: docker-config
    secret:
      secretName: "my-registry-secret"
      items:
        - key: .dockerconfigjson
          path: config.json
