apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    # [수정] git-cli 태스크를 추가해야 PaC가 자동으로 태스크를 가져옵니다.
    pipelinesascode.tekton.dev/task: "[git-clone, buildah, git-cli]"
  name: build-and-push
spec:
  params:
  - name: repo_url
    value: '{{ repo_url }}'
  - name: revision
    value: '{{ revision }}'
  # [수정] 태그를 latest 대신 $(params.revision)으로 쓰는 것이 GitOps의 정석입니다.
  - name: image_url
    value: "registry.ocp.test.com:5000/user1/test_project:{{ revision }}"
  - name: gitops_repo_url
    value: "https://github.com/soyoung1130/gitops_project"
  pipelineSpec:
    params:
    - name: repo_url
    - name: revision
    - name: image_url
    - name: gitops_repo_url # [추가] 하위 태스크로 전달하기 위해 명시
    tasks:
    - name: fetch-repository
      params:
      - name: url
        value: $(params.repo_url)
      - name: revision
        value: $(params.revision)
      taskRef:
        name: git-clone
      workspaces:
      - name: output
        workspace: source
      - name: basic-auth
        workspace: basic-auth

    - name: build-image
      runAfter:
      - fetch-repository
      taskRef:
        name: buildah
      params:
      - name: IMAGE
        value: $(params.image_url)
      - name: TLSVERIFY
        value: "false"
      workspaces:
      - name: source
        workspace: source
      - name: dockerconfig 
        workspace: docker-config 

    - name: update-gitops
      runAfter:
      - build-image
      taskRef:
        name: git-cli
      params:
      - name: GIT_USER_NAME
        value: "tekton-ci"
      - name: GIT_USER_EMAIL
        value: "tekton@ocp.test.com"
      - name: GIT_SCRIPT
        value: |
          # 1. GitOps 레포 클론
          git clone $(params.gitops_repo_url) gitops-repo
          cd gitops_project/overlays/dev

          # 2. customization.yaml의 이미지 태그 수정
          # base의 이미지를 새로운 태그로 덮어쓰도록 sed 실행
          sed -i "s/newTag: .*/newTag: $(params.revision)/g" customization.yaml

          # 3. 변경사항 커밋 및 푸시
          git config --global user.email "tekton@ocp.test.com"
          git config --global user.name "tekton-ci"
          git add customization.yaml
          git commit -m "chore: update image tag to $(params.revision) [skip ci]"
          git push origin main
      workspaces:
      - name: source
        workspace: source
      - name: basic-auth # GitOps 레포 푸시 권한용
        workspace: basic-auth

  workspaces:
  - name: source
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
  - name: basic-auth
    secret:
      secretName: '{{ git_auth_secret }}'
  - name: docker-config
    secret:
      secretName: "gitsecret"
      items: 
        - key: .dockerconfigjson
          path: config.json